[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  included_files = ["index.html", "install.html"]

[[redirects]]
  from = "/install.html"
  to = "/.netlify/functions/install"
  status = 200
  force = true

[[redirects]]
  from = "/index.html"
  to = "/.netlify/functions/index"
  status = 200
  force = true

